name: MyST GitHub Pages Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options: [info, warning, debug]
      tags:
        description: 'Test scenario tags'
        required: false
        type: boolean
      environment:
        description: 'Environment to run tests against'
        type: environment
        required: true

# BASE_URL: 你的仓库名作为子路径，私有 repo + public Pages 时尤其重要
env:
  BASE_URL: /${{ github.event.repository.name }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}   # 按分支隔离，比单 group 'pages' 更精细
  cancel-in-progress: true         # 关键：新 push 取消旧 run，避免排队叠加 artifact

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5     # v3→v5，适配 Node 24 runner

      - uses: actions/setup-node@v4
        with:
          node-version: 20                  # 18→20，避 punycode 警告 + 长期支持
          cache: npm                        # 给全局 npm 包加缓存（下面 install -g 也能吃到些）

      - name: Install MyST
        run: npm install -g mystmd

      - name: Build HTML Assets
        run: |
          echo "Using BASE_URL=$BASE_URL"
          myst build --html --execute

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4   # v3→v4，与 deploy-pages@v4 配套
        with:
          path: './_build/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4